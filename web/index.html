  <script>
    // Guard Flutter web locale bootstrap: some environments expose
    // navigator.language/navigator.languages as "undefined", which crashes
    // Intl.Locale parsing during engine startup.
    (function () {
      try {
        var nav = window.navigator;
        if (!nav) return;

        function normalizeLanguage(value) {
          if (value == null) return null;
          var normalized = String(value).trim();
          if (!normalized) return null;
          var lower = normalized.toLowerCase();
          if (lower === 'undefined' || lower === 'null') return null;
          return normalized;
        }

        var rawLanguages = [];
        try {
          if (Array.isArray(nav.languages)) rawLanguages = nav.languages.slice();
        } catch (_) {}
        if (!rawLanguages.length) rawLanguages = [nav.language];

        var sanitized = rawLanguages
          .map(normalizeLanguage)
          .filter(function (value) { return !!value; });
        if (!sanitized.length) sanitized = ['en-US', 'en'];

        var primary = sanitized[0];
        try {
          Object.defineProperty(nav, 'language', {
            configurable: true,
            get: function () { return primary; },
          });
        } catch (_) {}
        try {
          Object.defineProperty(nav, 'languages', {
            configurable: true,
            get: function () { return sanitized.slice(); },
          });
        } catch (_) {}

        var htmlLang = normalizeLanguage(document.documentElement.lang);
        if (!htmlLang) {
          document.documentElement.lang = (primary.split('-')[0] || 'en').toLowerCase();
        }
      } catch (_) {}
    })();
  </script>

  <!-- MapLibre GL JS (required by maplibre_gl on web) -->
  <!-- Vendored locally to avoid CSP / CDN availability issues in production. -->
  <!-- Versioned query parameters track the app build so stale service-worker
       or browser caches do not keep old MapLibre/WebGL recovery code alive. -->
  <!-- Use the CSP build + explicit worker URL to support strict CSP (no blob: workers). -->
  <script>
    // Single source of truth for cache-busting/versioning.
    // `{{flutter_service_worker_version}}` is replaced during `flutter build web`.
    // If it isn't replaced (e.g. unusual tooling), fall back to a stable dev tag.
    (function () {
      try {
        var raw = String.raw`{{flutter_service_worker_version}}`;
        var match = raw.match(/[0-9a-f]{6,}/i);
        var v = match ? match[0] : raw;
        if (!v || raw.indexOf('{{') !== -1) v = 'dev';
        window.__kubusBuildVersion = v;
      } catch (_) {
        window.__kubusBuildVersion = 'dev';
      }
    })();
  </script>
  <script>
    (function () {
      try {
        var v = window.__kubusBuildVersion || 'dev';

        // CSS first.
        var css = document.createElement('link');
        css.rel = 'stylesheet';
        css.href = 'local/maplibre-gl/maplibre-gl.css?v=' + encodeURIComponent(String(v));
        document.head.appendChild(css);

        // Then MapLibre JS (must be loaded before we set the worker URL and
        // before Flutter instantiates the web map).
        var maplibre = document.createElement('script');
        maplibre.async = false; // preserve execution order
        maplibre.src = 'local/maplibre-gl/maplibre-gl-csp.js?v=' + encodeURIComponent(String(v));
        maplibre.onload = function () {
          try {
            if (window.maplibregl && typeof window.maplibregl.setWorkerUrl === 'function') {
              window.maplibregl.setWorkerUrl(
                'local/maplibre-gl/maplibre-gl-csp-worker.js?v=' + encodeURIComponent(String(v))
              );
            } else {
              console.error('MapLibre GL JS not available (window.maplibregl is missing).');
            }
          } catch (e) {
            console.error('MapLibre GL JS worker setup failed:', e);
          }

          // Finally, install the WebGL handler (needs MapLibre present).
          try {
            var handler = document.createElement('script');
            handler.async = false;
            handler.src = 'webgl_context_handler.js?v=' + encodeURIComponent(String(v));
            document.head.appendChild(handler);
          } catch (_) {}
        };
        document.head.appendChild(maplibre);
      } catch (e) {
        console.error('Kubus maplibre loader bootstrap failed:', e);
      }
    })();
  </script>
  <style id="kubus-maplibre-attribution-style">
    :root {

    /*
     * Both mobile and desktop use a single custom attribution control (the
     * in-app glass "info" button that opens the full attribution dialog). The
     * native MapLibre GL JS attribution / its compact "i" toggle would
     * otherwise also render in the bottom-left corner — duplicating the custom
     * button and (on mobile) re-appearing as a white "i" after a map refresh
     * that obscures the bottom menu. Suppress the native control unconditionally
     * so it never flashes before Flutter's initState adds the body class.
     * Legal attribution stays fully accessible via the custom button's dialog.
     */
    .maplibregl-ctrl-attrib,
    .maplibregl-ctrl-attrib-button {
      display: none !important;
    }

    body.kubus-mobile-map .maplibregl-ctrl-attrib,
    body.kubus-mobile-map .maplibregl-ctrl-attrib-button,
    body.kubus-desktop-map .maplibregl-ctrl-attrib,

    }

    <style id="kubus-webgl-fallback-style">
     /* Kubus dark/teal fallback for WebGL/canvas flashes. This ensures a
       consistent non-white background when canvases are (re)created or
       WebGL contexts are lost/restored. */
     :root {
      --kubus-map-fallback: #012f2f; /* dark teal */
      --kubus-map-fallback-opaque: rgba(1,47,47,1);
      --kubus-map-fallback-subtle: rgba(1,47,47,0.92);
     }

     /* Apply fallback broadly to page roots and Flutter host elements so
       there is never a white flash while the platform view/CanvasKit
       surfaces are being created. Keep pointer-events untouched so
       Flutter overlays remain interactive. */
     html, body, #flt-glass-pane, flt-platform-view, flt-platform-view-slot {
      background-color: var(--kubus-map-fallback) !important;
      color-scheme: dark;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
     }

     /* MapLibre specific canvas/container fallback. The map canvas is a
       drawable element; set a fallback background color and ensure the
       recovery overlay is visually dark/teal but non-blocking to Flutter
       overlays. */
     .maplibregl-map,
     .maplibregl-canvas-container,
     .maplibregl-canvas {
      background-color: var(--kubus-map-fallback) !important;
      /* Canvas should not intercept pointer events intended for Flutter
        overlays that sit above it. Leave pointer-events as default for
        normal map interaction, but recovery visuals avoid blocking. */
     }

     /* When a canvas/container is in recovering state (set by
       webgl_context_handler.js) provide a visible dark backdrop that is
       guaranteed to be non-white. Use attribute selector since the
       handler sets dataset.webglRecovering = 'true'. */
     .maplibregl-canvas[data-webgl-recovering="true"],
     .maplibregl-map[data-webgl-recovering="true"],
     .maplibregl-canvas-container[data-webgl-recovering="true"] {
      background-color: var(--kubus-map-fallback-subtle) !important;
      /* Keep canvas fully visible for debug; do not add opaque overlays
        that would block Flutter UI. */
     }

     /* Helper CSS class for JS to toggle if preferred. It mirrors the
       attribute selector above and can be used by other scripts. */
     .kubus-webgl-recovering {
      background-color: var(--kubus-map-fallback-subtle) !important;
     }
    </style>

  <!-- Dev helper: Unregister service workers + clear Flutter caches on local dev only.
       This is intentionally conservative so it will NOT run on production hosts.
       It only acts when running on localhost/127.0.0.1/::1 or when a port is present
       (typical dev servers). It only removes caches that look like Flutter caches
       to avoid deleting unrelated site caches. -->
  <script>
    (function() {
      try {
        var hostname = location.hostname || '';
        var qs = (location.search || '').toLowerCase();
        // Opt-in escape hatch for production deployments: append `?clear_sw=1`
        // to clear the Flutter service worker + caches and force a clean reload.
        // This is intentionally NOT automatic in production.
        var forceClear = qs.indexOf('clear_sw=1') !== -1 || qs.indexOf('clear-sw=1') !== -1;

        var isLocalHost = hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '::1' || location.port !== '';
        if (!isLocalHost && !forceClear) return;

        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations()
            .then(function(regs) {
              regs.forEach(function(r) {
                try { if (isLocalHost) console.info('Dev helper: unregistering service worker at', r.scope); } catch(e) {}
                r.unregister();
              });
            })
            .catch(function(e) { console.warn('Dev helper: getRegistrations failed', e); });
        }

        if (window.caches && caches.keys) {
          caches.keys()
            .then(function(names) {
              names.forEach(function(name) {
                try {
                  var n = (name || '').toLowerCase();
                  // Only delete caches that look like Flutter-generated caches
                  if (n.indexOf('flutter') !== -1 || n.indexOf('flutter-app-manifest') !== -1 || n.indexOf('flutter-temp-cache') !== -1) {
                    caches.delete(name);
                    try { if (isLocalHost) console.info('Dev helper: deleted cache', name); } catch(e) {}
                  }
                } catch (e) { /* ignore individual cache errors */ }
              });
            })
            .catch(function(e) { console.warn('Dev helper: caches.keys failed', e); });
        }

        // If this was a forced production clear, reload once without the flag.
        if (forceClear) {
          try {
            var url = new URL(location.href);
            url.searchParams.delete('clear_sw');
            url.searchParams.delete('clear-sw');
            // Also drop the raw query token variants.
            var cleaned = url.toString().replace(/([?&])clear_sw=1(&|$)/, '$1').replace(/([?&])clear-sw=1(&|$)/, '$1');
            // Normalize any trailing ? or &
            cleaned = cleaned.replace(/[?&]$/, '');
            location.replace(cleaned);
          } catch (e) {
            location.reload();
          }
        }
      } catch (e) {
        console.warn('Dev helper: unregister script failed', e);
      }
    })();
  </script>

  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }

    // Remove the native splash once Flutter paints its first frame.
    // This prevents the splash logo from remaining visible behind/above the app.
    window.addEventListener('flutter-first-frame', function() {
