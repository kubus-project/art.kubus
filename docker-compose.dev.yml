name: artkubus-dev

services:
  postgres:
    build:
      context: ./backend
      dockerfile: Dockerfile.postgres
    container_name: artkubus-dev-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-artkubus}
      POSTGRES_USER: ${POSTGRES_USER:-artkubus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-artkubus_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-artkubus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: artkubus-dev-redis
    command: redis-server --save "" --appendonly no
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - dev_redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artkubus-dev-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-artkubus}:${DB_PASSWORD:-artkubus_dev}@postgres:5432/${POSTGRES_DB:-artkubus}
      REDIS_URL: redis://redis:6379
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_DRIVER: ${CACHE_DRIVER:-redis}
      CACHE_DEFAULT_TTL: ${CACHE_DEFAULT_TTL:-90}
      JWT_SECRET: ${JWT_SECRET:-artkubus_dev_jwt_secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://127.0.0.1,http://[::1]}
      ADMIN_CORS_ORIGIN: ${ADMIN_CORS_ORIGIN:-}
      HTTP_BASE_URL: ${HTTP_BASE_URL:-http://localhost:3000}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      USE_MOCK_DATA: ${USE_MOCK_DATA:-false}
      ORBITDB_SYNC_MODE: ${ORBITDB_SYNC_MODE:-off}
      ORBITDB_AUTO_INIT: ${ORBITDB_AUTO_INIT:-false}
      ADMIN_WHITELIST_PATH: /app/uploads/admin-whitelist.local.json
      ENABLE_WALLET_AUTH: ${ENABLE_WALLET_AUTH:-true}
      ENABLE_EMAIL_AUTH: ${ENABLE_EMAIL_AUTH:-true}
      ENABLE_GOOGLE_AUTH: ${ENABLE_GOOGLE_AUTH:-true}
      GOOGLE_CLIENT_IDS: ${GOOGLE_CLIENT_IDS:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_WEB_CLIENT_ID: ${GOOGLE_WEB_CLIENT_ID:-}
      GOOGLE_IOS_CLIENT_ID: ${GOOGLE_IOS_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      EMAIL_OCTOPUS_API_KEY: ${EMAIL_OCTOPUS_API_KEY:-dev_email_octopus_key}
      EMAIL_OCTOPUS_WAITLIST_LIST_ID: ${EMAIL_OCTOPUS_WAITLIST_LIST_ID:-dev_waitlist}
      EMAIL_OCTOPUS_NEWSLETTER_LIST_ID: ${EMAIL_OCTOPUS_NEWSLETTER_LIST_ID:-dev_newsletter}
      EMAIL_OCTOPUS_SUBDOMAIN: ${EMAIL_OCTOPUS_SUBDOMAIN:-api}
      FEATURE_ENABLE_MEDIA_PROXY: ${FEATURE_ENABLE_MEDIA_PROXY:-true}
      ENABLE_DEBUG_ENDPOINTS: ${ENABLE_DEBUG_ENDPOINTS:-true}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "src/utils/healthcheck.js"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
    volumes:
      - dev_uploads:/app/uploads

volumes:
  dev_postgres_data:
  dev_redis_data:
  dev_uploads:
