plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def releaseKeystorePath = System.getenv('ANDROID_KEYSTORE_PATH') ?: localProperties.getProperty('storeFile')
def releaseKeystorePassword = System.getenv('ANDROID_KEYSTORE_PASSWORD') ?: localProperties.getProperty('storePassword')
def releaseKeyAlias = System.getenv('ANDROID_KEY_ALIAS') ?: localProperties.getProperty('keyAlias')
def releaseKeyPassword = System.getenv('ANDROID_KEY_PASSWORD') ?: localProperties.getProperty('keyPassword')
def releaseSigningValues = [
    releaseKeystorePath,
    releaseKeystorePassword,
    releaseKeyAlias,
    releaseKeyPassword,
]
def hasAnyReleaseSigningValue = releaseSigningValues.any { value -> value != null && !value.toString().trim().isEmpty() }
def hasReleaseSigning = releaseSigningValues.every { value -> value != null && !value.toString().trim().isEmpty() }
def requireReleaseSigning = System.getenv('KUBUS_REQUIRE_RELEASE_SIGNING') == 'true'

if (hasAnyReleaseSigningValue && !hasReleaseSigning) {
    throw new GradleException('Release signing is partially configured. Provide store path/password, key alias, and key password.')
}
if (requireReleaseSigning && !hasReleaseSigning) {
    throw new GradleException('A publishable release requires complete Android release-signing credentials.')
}

android {
    namespace = "com.art.kubus"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
        coreLibraryDesugaringEnabled = true
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId = "com.art.kubus"
        minSdk = 24
        targetSdk = 36
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile = file(releaseKeystorePath)
                storePassword = releaseKeystorePassword
                keyAlias = releaseKeyAlias
                keyPassword = releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig = signingConfigs.release
            }
            minifyEnabled = false
            shrinkResources = false
        }
    }
}

flutter {
    source = '../..'
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_21
    }
}

dependencies {
     implementation 'androidx.appcompat:appcompat:1.7.0'  // Updated for SDK 35
     implementation 'com.google.ar:core:1.26.0'
     // Sceneform dependencies for ARCore plugin
     implementation 'com.google.ar.sceneform.ux:sceneform-ux:1.17.1'
     implementation 'com.google.ar.sceneform:core:1.15.0'
     // Core library desugaring for flutter_local_notifications
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
     
     // Force compatible material components version to avoid lStar attribute error
     implementation 'com.google.android.material:material:1.9.0'
}
