name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.2'
  NODE_VERSION: '22.15.0'
  NPM_VERSION: '11.7.0'

jobs:
  changes:
    name: Resolve affected CI surfaces
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      full: ${{ steps.filter.outputs.full }}
      frontend: ${{ steps.filter.outputs.frontend }}
      web: ${{ steps.filter.outputs.web }}
      backend: ${{ steps.filter.outputs.backend }}
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      docs: ${{ steps.filter.outputs.docs }}
      versioning: ${{ steps.filter.outputs.versioning }}
    steps:
      - name: Checkout change metadata
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2
          submodules: false

      - name: Classify changed paths
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail

          full=false
          frontend=false
          web=false
          backend=false
          android=false
          ios=false
          docs=false
          versioning=false

          if [ "$EVENT_NAME" = 'push' ] || [ "$EVENT_NAME" = 'workflow_dispatch' ]; then
            full=true
          fi

          base_sha="$BASE_SHA"
          if [ -z "$base_sha" ] || [[ "$base_sha" =~ ^0+$ ]]; then
            base_sha="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
          fi
          if ! git cat-file -e "$base_sha^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "$base_sha"
          fi

          git diff --name-only "$base_sha" "$GITHUB_SHA" > "$RUNNER_TEMP/changed-files.txt"
          echo 'Changed files:'
          cat "$RUNNER_TEMP/changed-files.txt"

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            case "$file" in
              .github/workflows/*|scripts/ci/*|.gitmodules)
                full=true
                ;;
            esac
            case "$file" in
              lib/*|test/*|integration_test/*|assets/*|tool/*|pubspec.yaml|pubspec.lock|analysis_options.yaml)
                frontend=true
                ;;
            esac
            case "$file" in
              web/*|scripts/qa/*)
                web=true
                ;;
            esac
            case "$file" in
              backend|backend-open-art-wt)
                backend=true
                ;;
            esac
            case "$file" in
              android/*|pubspec.yaml|pubspec.lock)
                android=true
                ;;
            esac
            case "$file" in
              ios/*|pubspec.yaml|pubspec.lock)
                ios=true
                ;;
            esac
            case "$file" in
              docs/*|AGENTS.md|*/AGENTS.md|DESLOPPIFY.md|README.md)
                docs=true
                ;;
            esac
            case "$file" in
              pubspec.yaml|version.json|package.json|scripts/sync_version.js|scripts/sync_all_versions.mjs|backend|backend-open-art-wt)
                versioning=true
                ;;
            esac
          done < "$RUNNER_TEMP/changed-files.txt"

          {
            echo "full=$full"
            echo "frontend=$frontend"
            echo "web=$web"
            echo "backend=$backend"
            echo "android=$android"
            echo "ios=$ios"
            echo "docs=$docs"
            echo "versioning=$versioning"
          } | tee -a "$GITHUB_OUTPUT"

  guardrails:
    name: Guardrails + pinned sources
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout root repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Reject divergent backend gitlinks before network access
        shell: bash
        run: |
          set -euo pipefail
          canonical_expected="$(git rev-parse HEAD:backend)"
          public_expected="$(git rev-parse HEAD:backend-open-art-wt)"
          if [ "$canonical_expected" != "$public_expected" ]; then
            echo "backend and backend-open-art-wt must pin the same backend commit." >&2
            echo "backend:             $canonical_expected" >&2
            echo "backend-open-art-wt: $public_expected" >&2
            exit 1
          fi

      - name: Materialize one private backend clone and local worktree
        if: >-
          ${{
            (needs.changes.outputs.full == 'true' ||
             needs.changes.outputs.backend == 'true' ||
             needs.changes.outputs.docs == 'true' ||
             needs.changes.outputs.versioning == 'true') &&
            (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
          }}
        shell: bash
        env:
          BACKEND_SUBMODULE_SSH_KEY: ${{ secrets.BACKEND_SUBMODULE_SSH_KEY }}
        run: bash scripts/ci/checkout_backend_submodules.sh

      - name: Set up pinned Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pinned npm
        run: npm install --global npm@${NPM_VERSION}

      - name: Verify pinned Node/npm
        run: npm run verify:toolchain:node

      - name: Architecture guard
        run: npm run verify:architecture

      - name: Documentation guard
        if: >-
          ${{
            (needs.changes.outputs.full == 'true' ||
             needs.changes.outputs.backend == 'true' ||
             needs.changes.outputs.docs == 'true') &&
            (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
          }}
        run: npm run docs:doctor

      - name: Version parity guard
        if: >-
          ${{
            (needs.changes.outputs.full == 'true' ||
             needs.changes.outputs.backend == 'true' ||
             needs.changes.outputs.versioning == 'true') &&
            (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
          }}
        run: |
          npm run check:versions
          git diff --exit-code

      - name: Validate deployed PHP gateways
        if: ${{ needs.changes.outputs.full == 'true' || needs.changes.outputs.web == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y >/dev/null
          sudo apt-get install -y --no-install-recommends php-cli >/dev/null
          mapfile -t php_files < <(find web -type f -name '*.php' | sort)
          test "${#php_files[@]}" -gt 0
          for file in "${php_files[@]}"; do
            php -l "$file"
          done

      - name: Reject client-side Pinata credentials
        shell: bash
        run: |
          pinata_prefix='KUBUS_PINATA_'
          if rg -n "${pinata_prefix}(API|SECRET)_KEY" .github lib web android scripts; then
            echo "Client-side Pinata credentials are forbidden." >&2
            exit 1
          fi

      - name: Exercise atomic web promotion and rollback
        if: ${{ needs.changes.outputs.full == 'true' || needs.changes.outputs.web == 'true' }}
        run: npm run verify:deploy

  build_metadata:
    name: Resolve immutable CI build metadata
    needs: [changes, guardrails]
    if: >-
      ${{
        needs.changes.outputs.full == 'true' ||
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.web == 'true' ||
        needs.changes.outputs.android == 'true' ||
        needs.changes.outputs.ios == 'true'
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      build_date: ${{ steps.resolve.outputs.build_date }}
      build_number: ${{ steps.resolve.outputs.build_number }}
    steps:
      - name: Checkout version source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Set up pinned Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve CI build metadata
        id: resolve
        run: node scripts/resolve_ci_build_metadata.mjs --github-output "$GITHUB_OUTPUT"

  flutter:
    name: Flutter quality + web artifact
    needs: [changes, guardrails, build_metadata]
    if: >-
      ${{
        needs.changes.outputs.full == 'true' ||
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.web == 'true'
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout frontend source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Set up pinned Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pinned npm
        run: npm install --global npm@${NPM_VERSION}

      - name: Set up pinned Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Verify toolchain
        run: |
          npm run verify:toolchain:node
          npm run verify:toolchain:flutter

      - name: Resolve locked Flutter dependencies
        run: |
          flutter pub get
          git diff --exit-code -- pubspec.lock

      - name: Flutter analyze
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Kubus custom lint
        run: dart run custom_lint

      - name: Kubus lint ratchet
        run: node scripts/kubus-lint-ratchet.mjs --check

      - name: Flutter test suite
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = 'push' ]; then
            flutter test --coverage
          else
            flutter test
          fi

      - name: Upload Flutter coverage
        if: ${{ github.event_name == 'push' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: flutter-coverage-${{ github.sha }}
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 3

      - name: Prepare required public build configuration
        env:
          KUBUS_BACKEND_URL: ${{ vars.KUBUS_BACKEND_URL }}
          KUBUS_GOOGLE_CLIENT_ID: ${{ vars.KUBUS_GOOGLE_CLIENT_ID }}
          KUBUS_GOOGLE_WEB_CLIENT_ID: ${{ vars.KUBUS_GOOGLE_WEB_CLIENT_ID }}
          KUBUS_GOOGLE_IOS_CLIENT_ID: ${{ vars.KUBUS_GOOGLE_IOS_CLIENT_ID }}
          KUBUS_WALLETCONNECT_PROJECT_ID: ${{ vars.KUBUS_WALLETCONNECT_PROJECT_ID }}
          KUBUS_APP_VERSION: ${{ needs.build_metadata.outputs.version }}
          KUBUS_BUILD_NUMBER: ${{ needs.build_metadata.outputs.build_number }}
          KUBUS_BUILD_DATE: ${{ needs.build_metadata.outputs.build_date }}
        run: node scripts/prepare_public_build_config.mjs --web

      - name: Build release web bundle
        run: |
          flutter build web --release \
            --build-name="${{ needs.build_metadata.outputs.version }}" \
            --build-number="${{ needs.build_metadata.outputs.build_number }}" \
            --dart-define=PUBLIC_FLUTTER_TAKEOVER_ENABLED=true \
            --dart-define=SEO_PUBLIC_PAGES_ENABLED=true \
            --dart-define-from-file=.dart_tool/public-build-defines.json

      - name: Stamp and checksum deployable web bundle
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "${{ github.sha }}" > build/web/kubus-web-revision.txt
          sudo apt-get update -y >/dev/null
          sudo apt-get install -y --no-install-recommends brotli >/dev/null
          find build/web -type f -name '*.wasm' -print0 | while IFS= read -r -d '' file; do
            brotli -f -q 9 "$file"
            gzip -kf6 "$file"
          done
          (
            cd build/web
            find . -type f ! -name SHA256SUMS -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS
            sha256sum -c SHA256SUMS
          )

      - name: Upload exact web bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: flutter-web-${{ github.sha }}
          path: build/web
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 3

  backend:
    name: Canonical backend validation
    needs: [changes, guardrails]
    if: ${{ needs.changes.outputs.full == 'true' || needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout parent repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Materialize canonical backend once
        shell: bash
        env:
          BACKEND_SUBMODULE_SSH_KEY: ${{ secrets.BACKEND_SUBMODULE_SSH_KEY }}
        run: bash scripts/ci/checkout_backend_submodules.sh

      - name: Require backend lockfile
        run: test -f backend/package-lock.json

      - name: Set up pinned Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Set up pinned npm
        run: npm install --global npm@${NPM_VERSION}

      - name: Verify Node/npm
        run: npm run verify:toolchain:node

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: Backend lint
        working-directory: backend
        run: npm run lint

      - name: Backend deterministic tests
        env:
          NODE_ENV: test
        working-directory: backend
        run: npm run test:ci

      - name: Production dependency audit
        if: ${{ github.event_name == 'push' }}
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high

      - name: Upload backend evidence
        if: ${{ github.event_name == 'push' && always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-coverage-${{ github.sha }}
          path: backend/coverage
          if-no-files-found: warn
          retention-days: 3

  android:
    name: Android release compile
    needs: [changes, guardrails, build_metadata]
    if: ${{ needs.changes.outputs.full == 'true' || needs.changes.outputs.android == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
      GRADLE_OPTS: -Dorg.gradle.workers.max=1 -Dorg.gradle.daemon=false
    steps:
      - name: Checkout Android source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Set up pinned Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pinned npm
        run: npm install --global npm@${NPM_VERSION}

      - name: Set up Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up pinned Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Ensure Android SDK 36
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "${ANDROID_HOME}/platforms/android-36" ]; then
            yes | sdkmanager --licenses >/dev/null 2>&1 || true
            sdkmanager --install "platforms;android-36" "build-tools;36.0.0" "platform-tools"
          fi

      - name: Verify Android toolchain
        run: |
          test -x android/gradlew
          npm run verify:toolchain:android

      - name: Resolve locked Flutter dependencies
        run: |
          flutter pub get
          git diff --exit-code -- pubspec.lock

      - name: Prepare required public build configuration
        env:
          KUBUS_BACKEND_URL: ${{ vars.KUBUS_BACKEND_URL }}
          KUBUS_GOOGLE_CLIENT_ID: ${{ vars.KUBUS_GOOGLE_CLIENT_ID }}
          KUBUS_GOOGLE_WEB_CLIENT_ID: ${{ vars.KUBUS_GOOGLE_WEB_CLIENT_ID }}
          KUBUS_GOOGLE_IOS_CLIENT_ID: ${{ vars.KUBUS_GOOGLE_IOS_CLIENT_ID }}
          KUBUS_WALLETCONNECT_PROJECT_ID: ${{ vars.KUBUS_WALLETCONNECT_PROJECT_ID }}
          KUBUS_APP_VERSION: ${{ needs.build_metadata.outputs.version }}
          KUBUS_BUILD_NUMBER: ${{ needs.build_metadata.outputs.build_number }}
          KUBUS_BUILD_DATE: ${{ needs.build_metadata.outputs.build_date }}
        run: node scripts/prepare_public_build_config.mjs

      - name: Clear generated Android problems report
        run: node scripts/clear_generated_android_reports.mjs

      - name: Compile unsigned Android release APK
        run: |
          flutter build apk --release \
            --build-name="${{ needs.build_metadata.outputs.version }}" \
            --build-number="${{ needs.build_metadata.outputs.build_number }}" \
            --dart-define-from-file=.dart_tool/public-build-defines.json

      - name: Reject Gradle build errors
        shell: bash
        run: |
          report=android/build/reports/problems/problems-report.html
          if [ -f "$report" ] && rg -q '"severity":"ERROR"' "$report"; then
            echo "Gradle problems report contains an error." >&2
            exit 1
          fi

      - name: Upload Android verification output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-verification-${{ github.sha }}
          path: build/app/outputs/flutter-apk
          if-no-files-found: error
          retention-days: 3

  ios:
    name: iOS release compile (no codesign)
    needs: [changes, guardrails, build_metadata]
    if: ${{ needs.changes.outputs.full == 'true' || needs.changes.outputs.ios == 'true' }}
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout iOS source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Set up pinned Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pinned npm
        run: npm install --global npm@${NPM_VERSION}

      - name: Record hosted Xcode toolchain
        run: xcodebuild -version

      - name: Set up pinned Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Verify toolchain
        run: |
          npm run verify:toolchain:node
          npm run verify:toolchain:flutter

      - name: Resolve locked Flutter dependencies
        run: |
          flutter pub get
          git diff --exit-code -- pubspec.lock

      - name: Prepare required public build configuration
        env:
          KUBUS_BACKEND_URL: ${{ vars.KUBUS_BACKEND_URL }}
          KUBUS_GOOGLE_CLIENT_ID: ${{ vars.KUBUS_GOOGLE_CLIENT_ID }}
          KUBUS_GOOGLE_WEB_CLIENT_ID: ${{ vars.KUBUS_GOOGLE_WEB_CLIENT_ID }}
          KUBUS_GOOGLE_IOS_CLIENT_ID: ${{ vars.KUBUS_GOOGLE_IOS_CLIENT_ID }}
          KUBUS_WALLETCONNECT_PROJECT_ID: ${{ vars.KUBUS_WALLETCONNECT_PROJECT_ID }}
          KUBUS_APP_VERSION: ${{ needs.build_metadata.outputs.version }}
          KUBUS_BUILD_NUMBER: ${{ needs.build_metadata.outputs.build_number }}
          KUBUS_BUILD_DATE: ${{ needs.build_metadata.outputs.build_date }}
        run: node scripts/prepare_public_build_config.mjs

      - name: Retain exact iOS release build inputs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ios-release-inputs-${{ github.sha }}
          path: .dart_tool/public-build-defines.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 3

      - name: Compile iOS release without codesigning
        run: |
          flutter build ios --release --no-codesign \
            --build-name="${{ needs.build_metadata.outputs.version }}" \
            --build-number="${{ needs.build_metadata.outputs.build_number }}" \
            --dart-define-from-file=.dart_tool/public-build-defines.json

  web_qa:
    name: Playwright Chromium runtime smoke
    needs: [changes, flutter]
    if: >-
      ${{
        needs.changes.outputs.full == 'true' ||
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.web == 'true'
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout web QA harness
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Set up pinned Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: scripts/qa/package-lock.json

      - name: Set up pinned npm
        run: npm install --global npm@${NPM_VERSION}

      - name: Download exact web bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: flutter-web-${{ github.sha }}
          path: build/web

      - name: Install Playwright harness
        run: npm --prefix scripts/qa ci --no-audit --no-fund

      - name: Install Chromium
        run: npm --prefix scripts/qa exec -- playwright install --with-deps chromium

      - name: Run web runtime smoke
        env:
          QA_ARTIFACT_DIR: output/playwright/artifacts/ci-${{ github.sha }}
        run: npm run qa:web

      - name: Upload Playwright diagnostics on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-web-${{ github.sha }}
          path: output/playwright/artifacts
          if-no-files-found: warn
          retention-days: 3

  web_routing:
    name: Apache rewrite contract for web/.htaccess
    needs: changes
    if: ${{ needs.changes.outputs.full == 'true' || needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout routing files
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Serve web/ under Apache
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --name kubus-web -p 8081:80 \
            -v "$PWD/web:/usr/local/apache2/htdocs:ro" \
            httpd:2.4 \
            sh -c "sed -i \
                -e 's|^#LoadModule rewrite_module|LoadModule rewrite_module|' \
                -e 's|^#LoadModule headers_module|LoadModule headers_module|' \
                -e 's|^#LoadModule mime_module|LoadModule mime_module|' \
                -e 's|^#LoadModule access_compat_module|LoadModule access_compat_module|' \
                conf/httpd.conf \
              && printf '%s\n' \
                '<Directory \"/usr/local/apache2/htdocs\">' \
                '  Options -Indexes +FollowSymLinks' \
                '  AllowOverride All' \
                '  Require all granted' \
                '</Directory>' >> conf/httpd.conf \
              && httpd-foreground"

          for attempt in $(seq 1 30); do
            if [ "$(curl --silent --output /dev/null --write-out '%{http_code}' http://localhost:8081/)" != '000' ]; then
              exit 0
            fi
            sleep 1
          done
          docker logs kubus-web >&2
          exit 1

      - name: Routing contract
        env:
          KUBUS_BASE: http://localhost:8081
        run: node scripts/qa/web_routing_contract.mjs

      - name: Apache log on failure
        if: ${{ failure() }}
        run: docker logs kubus-web 2>&1 | tail -50

      - name: Stop Apache
        if: ${{ always() }}
        run: docker rm -f kubus-web || true

  ci_required:
    name: CI required
    needs:
      - changes
      - guardrails
      - build_metadata
      - flutter
      - backend
      - android
      - ios
      - web_qa
      - web_routing
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Require every selected job to pass
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ contains(needs.*.result, 'failure') }}" = 'true' ]; then
            echo 'At least one selected CI job failed.' >&2
            exit 1
          fi
          if [ "${{ contains(needs.*.result, 'cancelled') }}" = 'true' ]; then
            echo 'At least one selected CI job was cancelled.' >&2
            exit 1
          fi
          echo 'All selected CI jobs passed; non-applicable jobs were skipped.'
