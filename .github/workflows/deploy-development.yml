name: Deploy development web

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      bootstrap_web_root:
        description: One-time approved migration of the staging web root to the atomic symlink layout
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-development
  cancel-in-progress: false

jobs:
  source:
    name: Resolve exact dev source
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Reject non-dev invocation
        id: resolve
        shell: bash
        env:
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          test "$SOURCE_REF" = refs/heads/dev
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          echo "sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"

  build:
    name: Build immutable development artifact
    needs: source
    uses: ./.github/workflows/web-artifact.yml
    with:
      deployment_environment: development
      source_sha: ${{ needs.source.outputs.sha }}
      full_browser_matrix: false

  deploy:
    name: Promote staging artifact
    needs: [source, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment:
      name: development-web
      url: ${{ vars.WEB_SMOKE_URL }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/deploy-web-artifact
        with:
          artifact_name: ${{ needs.build.outputs.artifact_name }}
          source_sha: ${{ needs.source.outputs.sha }}
          source_branch: dev
          logical_environment: development
          environment_name: development-web
          retained_release_count: 5
          # GitHub Environment variables, forwarded explicitly because a composite
          # action cannot read the `vars` context.
          environment_variable_name: ${{ vars.ENVIRONMENT_NAME }}
          sftp_port: ${{ vars.SFTP_PORT }}
          web_server_dir: ${{ vars.WEB_SERVER_DIR }}
          web_releases_dir: ${{ vars.WEB_RELEASES_DIR }}
          web_smoke_url: ${{ vars.WEB_SMOKE_URL }}
          expected_deployment_host: ${{ vars.EXPECTED_DEPLOYMENT_HOST }}
          bootstrap_web_root: ${{ github.event_name == 'workflow_dispatch' && inputs.bootstrap_web_root }}
          sftp_server: ${{ secrets.SFTP_SERVER }}
          sftp_username: ${{ secrets.SFTP_USERNAME }}
          sftp_private_key: ${{ secrets.SFTP_PRIVATE_KEY }}
          sftp_private_key_passphrase: ${{ secrets.SFTP_PRIVATE_KEY_PASSPHRASE }}
          sftp_host_fingerprint: ${{ secrets.SFTP_HOST_FINGERPRINT }}
          http_basic_username: ${{ secrets.HTTP_BASIC_USERNAME }}
          http_basic_password: ${{ secrets.HTTP_BASIC_PASSWORD }}
