name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: 'Successful CI run ID containing the immutable artifacts'
        required: true
        type: string
      artifact_sha:
        description: 'Full 40-character commit SHA built by that CI run'
        required: true
        type: string
      deploy_web:
        description: 'Promote the tested Flutter web artifact'
        required: false
        default: true
        type: boolean
      bootstrap_web_root:
        description: 'One-time migration of the existing web root into the atomic symlink layout'
        required: false
        default: false
        type: boolean
      build_apk:
        description: 'Sign the tested unsigned Android artifact'
        required: false
        default: true
        type: boolean
      build_ipa:
        description: 'Sign and attach an iOS IPA when iOS publishing is enabled'
        required: false
        default: true
        type: boolean
      publish_github_release:
        description: 'Create a new immutable GitHub Release for the signed APK'
        required: false
        default: false
        type: boolean
      release_tag:
        description: 'New release tag (required when publishing)'
        required: false
        default: ''
        type: string
      prerelease:
        description: 'Mark the GitHub Release as a prerelease'
        required: false
        default: true
        type: boolean

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy_web:
    name: Promote immutable Flutter web artifact
    if: >-
      ${{
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy_web)
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    environment: production-web
    steps:
      - name: Resolve and verify successful CI source
        id: source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          INPUT_CI_RUN_ID: ${{ inputs.ci_run_id }}
          INPUT_ARTIFACT_SHA: ${{ inputs.artifact_sha }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            run_id="${{ github.event.workflow_run.id }}"
            artifact_sha="${{ github.event.workflow_run.head_sha }}"
            workflow_name="${{ github.event.workflow_run.name }}"
            conclusion="${{ github.event.workflow_run.conclusion }}"
          else
            run_id="$INPUT_CI_RUN_ID"
            artifact_sha="$INPUT_ARTIFACT_SHA"
            metadata="$RUNNER_TEMP/ci-run.json"
            curl --fail --silent --show-error --location \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/$REPOSITORY/actions/runs/$run_id" \
              > "$metadata"
            workflow_name="$(jq -r '.name' "$metadata")"
            conclusion="$(jq -r '.conclusion' "$metadata")"
            run_sha="$(jq -r '.head_sha' "$metadata")"
            if [ "$run_sha" != "$artifact_sha" ]; then
              echo "CI run $run_id belongs to $run_sha, not $artifact_sha." >&2
              exit 1
            fi
          fi

          if [ "$workflow_name" != "CI" ] || [ "$conclusion" != "success" ]; then
            echo "Deployment requires a successful CI workflow run." >&2
            exit 1
          fi
          if [[ ! "$run_id" =~ ^[0-9]+$ ]] || [[ ! "$artifact_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid CI run ID or artifact SHA." >&2
            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "sha=$artifact_sha" >> "$GITHUB_OUTPUT"

      - name: Checkout exact tested deployment logic
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.source.outputs.sha }}
          submodules: false

      - name: Download exact web artifact from CI
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: flutter-web-${{ steps.source.outputs.sha }}
          path: build/web
          run-id: ${{ steps.source.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Verify and package exact web artifact
        shell: bash
        run: |
          set -euo pipefail
          test -f build/web/index.html
          test -f build/web/SHA256SUMS
          (cd build/web && sha256sum -c SHA256SUMS)
          mkdir -p deployment
          archive="art-kubus-web-${{ steps.source.outputs.sha }}.tar.gz"
          tar -C build/web -czf "deployment/$archive" .
          (cd deployment && sha256sum "$archive" > "$archive.sha256")
          cp scripts/deploy/atomic_web_release.sh deployment/

      - name: Validate protected deployment inputs
        id: target
        shell: bash
        env:
          SFTP_HOST: ${{ secrets.SFTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
          SFTP_HOST_FINGERPRINT: ${{ secrets.SFTP_HOST_FINGERPRINT }}
          SFTP_PORT: ${{ vars.SFTP_PORT || '22' }}
          WEB_SERVER_DIR: ${{ vars.WEB_SERVER_DIR }}
          WEB_RELEASES_DIR: ${{ vars.WEB_RELEASES_DIR }}
          WEB_SMOKE_URL: ${{ vars.WEB_SMOKE_URL }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          set -euo pipefail
          required=(
            "$SFTP_HOST"
            "$SFTP_USERNAME"
            "$SFTP_PRIVATE_KEY"
            "$SFTP_HOST_FINGERPRINT"
            "$WEB_SERVER_DIR"
            "$WEB_SMOKE_URL"
          )
          for value in "${required[@]}"; do
            if [ -z "$value" ]; then
              echo "A required production-web secret or variable is missing." >&2
              exit 1
            fi
          done
          if [[ ! "$SFTP_HOST" =~ ^[A-Za-z0-9.-]+$ ]] || \
             [[ ! "$SFTP_USERNAME" =~ ^[A-Za-z0-9._-]+$ ]] || \
             [[ ! "$SFTP_PORT" =~ ^[0-9]+$ ]]; then
            echo "SFTP host, username, or port contains unsupported characters." >&2
            exit 1
          fi

          configured_live_dir="${WEB_SERVER_DIR%/}"
          live_dir="${configured_live_dir//\{SFTP_USERNAME\}/$SFTP_USERNAME}"
          if [[ ! "$live_dir" =~ ^/[A-Za-z0-9_./-]+$ ]] || [[ "$live_dir" == *'..'* ]]; then
            echo "WEB_SERVER_DIR must resolve to a safe absolute path." >&2
            exit 1
          fi
          parent_dir="$(dirname "$live_dir")"
          configured_release_root="${WEB_RELEASES_DIR%/}"
          release_root="${configured_release_root//\{SFTP_USERNAME\}/$SFTP_USERNAME}"
          if [ -z "$release_root" ]; then
            release_root="$parent_dir/.art-kubus-releases"
          fi
          if [[ ! "$release_root" =~ ^/[A-Za-z0-9_./-]+$ ]] || [[ "$release_root" == *'..'* ]]; then
            echo "WEB_RELEASES_DIR must be a safe absolute path." >&2
            exit 1
          fi

          echo "host=$SFTP_HOST" >> "$GITHUB_OUTPUT"
          echo "username=$SFTP_USERNAME" >> "$GITHUB_OUTPUT"
          echo "port=$SFTP_PORT" >> "$GITHUB_OUTPUT"
          echo "live_dir=$live_dir" >> "$GITHUB_OUTPUT"
          echo "release_root=$release_root" >> "$GITHUB_OUTPUT"
          echo "incoming_dir=$release_root/incoming-$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "release_dir=$release_root/releases/$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "bootstrap_dir=$release_root/bootstrap-$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "smoke_url=$WEB_SMOKE_URL" >> "$GITHUB_OUTPUT"

      - name: Wait for SSH deployment endpoint
        shell: bash
        env:
          SFTP_HOST: ${{ steps.target.outputs.host }}
          SFTP_PORT: ${{ steps.target.outputs.port }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6; do
            if timeout 15 bash -c "</dev/tcp/$SFTP_HOST/$SFTP_PORT" 2>/dev/null; then
              echo "SSH deployment endpoint is reachable."
              exit 0
            fi
            if [ "$attempt" -lt 6 ]; then
              delay_seconds=$((attempt * 10))
              echo "SSH deployment endpoint is not reachable; retrying in ${delay_seconds}s."
              sleep "$delay_seconds"
            fi
          done
          echo "SSH deployment endpoint remained unreachable after six attempts; no remote files were changed." >&2
          exit 1

      - name: Upload approved web-root bootstrap helper
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.bootstrap_web_root }}
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1
        with:
          host: ${{ steps.target.outputs.host }}
          username: ${{ steps.target.outputs.username }}
          port: ${{ steps.target.outputs.port }}
          key: ${{ secrets.SFTP_PRIVATE_KEY }}
          passphrase: ${{ secrets.SFTP_PRIVATE_KEY_PASSPHRASE }}
          fingerprint: ${{ secrets.SFTP_HOST_FINGERPRINT }}
          source: scripts/deploy/bootstrap_atomic_web_root.sh
          target: ${{ steps.target.outputs.bootstrap_dir }}
          strip_components: 2
          overwrite: true

      - name: Migrate existing web root into atomic layout
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.bootstrap_web_root }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          LIVE_DIR: ${{ steps.target.outputs.live_dir }}
          RELEASE_ROOT: ${{ steps.target.outputs.release_root }}
          BOOTSTRAP_DIR: ${{ steps.target.outputs.bootstrap_dir }}
        with:
          host: ${{ steps.target.outputs.host }}
          username: ${{ steps.target.outputs.username }}
          port: ${{ steps.target.outputs.port }}
          key: ${{ secrets.SFTP_PRIVATE_KEY }}
          passphrase: ${{ secrets.SFTP_PRIVATE_KEY_PASSPHRASE }}
          fingerprint: ${{ secrets.SFTP_HOST_FINGERPRINT }}
          envs: SOURCE_SHA,LIVE_DIR,RELEASE_ROOT,BOOTSTRAP_DIR
          script_stop: true
          script: |
            set -eu
            trap 'rm -rf "$BOOTSTRAP_DIR"' EXIT HUP INT TERM
            sh "$BOOTSTRAP_DIR/bootstrap_atomic_web_root.sh" \
              "$LIVE_DIR" "$RELEASE_ROOT" "$SOURCE_SHA"

      - name: Prepare versioned remote upload directory
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          LIVE_DIR: ${{ steps.target.outputs.live_dir }}
          INCOMING_DIR: ${{ steps.target.outputs.incoming_dir }}
          RELEASE_ROOT: ${{ steps.target.outputs.release_root }}
          RELEASE_DIR: ${{ steps.target.outputs.release_dir }}
        with:
          host: ${{ steps.target.outputs.host }}
          username: ${{ steps.target.outputs.username }}
          port: ${{ steps.target.outputs.port }}
          key: ${{ secrets.SFTP_PRIVATE_KEY }}
          passphrase: ${{ secrets.SFTP_PRIVATE_KEY_PASSPHRASE }}
          fingerprint: ${{ secrets.SFTP_HOST_FINGERPRINT }}
          envs: LIVE_DIR,INCOMING_DIR,RELEASE_ROOT,RELEASE_DIR
          script_stop: true
          script: |
            set -eu
            if [ ! -L "$LIVE_DIR" ]; then
              echo "WEB_SERVER_DIR must already be a symlink before atomic deployment." >&2
              exit 1
            fi
            if [ -e "$RELEASE_DIR" ]; then
              test -d "$RELEASE_DIR"
            fi
            rm -rf "$INCOMING_DIR"
            mkdir -p "$INCOMING_DIR" "$RELEASE_ROOT/releases"

      - name: Upload versioned web archive
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1
        with:
          host: ${{ steps.target.outputs.host }}
          username: ${{ steps.target.outputs.username }}
          port: ${{ steps.target.outputs.port }}
          key: ${{ secrets.SFTP_PRIVATE_KEY }}
          passphrase: ${{ secrets.SFTP_PRIVATE_KEY_PASSPHRASE }}
          fingerprint: ${{ secrets.SFTP_HOST_FINGERPRINT }}
          source: deployment/*
          target: ${{ steps.target.outputs.incoming_dir }}
          strip_components: 1
          overwrite: true

      - name: Verify checksums and atomically switch current web root
        id: promote
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          LIVE_DIR: ${{ steps.target.outputs.live_dir }}
          RELEASE_ROOT: ${{ steps.target.outputs.release_root }}
          INCOMING_DIR: ${{ steps.target.outputs.incoming_dir }}
          RELEASE_DIR: ${{ steps.target.outputs.release_dir }}
        with:
          host: ${{ steps.target.outputs.host }}
          username: ${{ steps.target.outputs.username }}
          port: ${{ steps.target.outputs.port }}
          key: ${{ secrets.SFTP_PRIVATE_KEY }}
          passphrase: ${{ secrets.SFTP_PRIVATE_KEY_PASSPHRASE }}
          fingerprint: ${{ secrets.SFTP_HOST_FINGERPRINT }}
          envs: SOURCE_SHA,LIVE_DIR,RELEASE_ROOT,INCOMING_DIR,RELEASE_DIR
          script_stop: true
          script: |
            set -eu
            sh "$INCOMING_DIR/atomic_web_release.sh" promote

      - name: Post-deploy HTTP smoke
        id: smoke
        shell: bash
        env:
          WEB_SMOKE_URL: ${{ steps.target.outputs.smoke_url }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          EXPECT_PUBLIC_FLUTTER_TAKEOVER: ${{ vars.EXPECT_PUBLIC_FLUTTER_TAKEOVER || 'false' }}
          PUBLIC_TAKEOVER_URL: ${{ vars.PUBLIC_TAKEOVER_URL }}
          PUBLIC_TAKEOVER_MISSING_URL: ${{ vars.PUBLIC_TAKEOVER_MISSING_URL }}
          PUBLIC_TAKEOVER_OPTIONAL_STANDBY_URL: ${{ vars.PUBLIC_TAKEOVER_OPTIONAL_STANDBY_URL }}
          PUBLIC_CONTRACT_ARTWORK_ID: ${{ vars.PUBLIC_CONTRACT_ARTWORK_ID }}
        run: |
          set -euo pipefail
          origin="$(printf '%s' "$WEB_SMOKE_URL" | sed -E 's#(https?://[^/]+).*#\1#')"

          # Root canonicalization: exactly one permanent hop into the localized
          # canonical. Root must NOT serve the Flutter shell, or it becomes a
          # second indexable homepage competing with /en.
          root_status="$(curl --silent --output /dev/null --write-out '%{http_code}' "$origin/")"
          root_target="$(curl --silent --output /dev/null --write-out '%{redirect_url}' "$origin/")"
          if [ "$root_status" != '308' ] || [ "$root_target" != "$origin/en" ]; then
            echo "Root canonicalization broken: expected 308 -> $origin/en, got $root_status -> $root_target" >&2
            exit 1
          fi

          # The interactive app keeps its own entry at /app (PWA start_url).
          response="$RUNNER_TEMP/web-smoke.html"
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 3 --retry-all-errors \
            --header 'Cache-Control: no-cache' \
            --header 'Pragma: no-cache' \
            "$origin/app" \
            --output "$response"
          grep -Eq 'flutter_bootstrap\.js|main\.dart\.js' "$response"

          public_home="$RUNNER_TEMP/public-home.html"
          robots="$RUNNER_TEMP/robots.txt"
          curl --fail --silent --show-error --retry 5 --retry-delay 3 \
            "$origin/en" --output "$public_home"
          grep -q '<h1>' "$public_home"
          grep -q 'rel="canonical"' "$public_home"
          if grep -Eq 'flutter_bootstrap\.js|main\.dart\.js|maplibre' "$public_home"; then
            echo 'Public HTML unexpectedly loads the interactive app bundle.' >&2
            exit 1
          fi
          curl --fail --silent --show-error "$origin/robots.txt" --output "$robots"
          grep -q "Sitemap: $origin/sitemap.xml" "$robots"
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' "$origin/__deploy_unknown_${SOURCE_SHA}")" = '404'

          # Deployment revision identity: production must serve the exact tested
          # commit. Guards against a promoted symlink that did not actually
          # switch, or a stale cached artifact surviving the release.
          served_revision="$(curl --silent --head "$origin/en" \
            | tr -d '\r' \
            | awk 'BEGIN{IGNORECASE=1} /^X-Kubus-Web-Revision:/ {print $2}')"
          if [ "$served_revision" != "$SOURCE_SHA" ]; then
            echo "Revision drift: production serves '${served_revision:-<absent>}', expected '$SOURCE_SHA'." >&2
            exit 1
          fi

          # Compact aliases must resolve in one permanent hop to the localized
          # canonical entity URL, never to a generic app shell.
          if [ -n "${PUBLIC_TAKEOVER_URL:-}" ]; then
            alias_id="$(printf '%s' "$PUBLIC_TAKEOVER_URL" | sed -E 's#.*/##')"
            alias_status="$(curl --silent --output /dev/null --write-out '%{http_code}' "$origin/a/$alias_id")"
            alias_target="$(curl --silent --output /dev/null --write-out '%{redirect_url}' "$origin/a/$alias_id")"
            if [ "$alias_status" != '308' ] || [ "$alias_target" != "$origin/en/artworks/$alias_id" ]; then
              echo "Compact alias broken: expected 308 -> $origin/en/artworks/$alias_id, got $alias_status -> $alias_target" >&2
              exit 1
            fi
          fi

          case "${EXPECT_PUBLIC_FLUTTER_TAKEOVER,,}" in
            true|1|yes|on)
              if [ -z "$PUBLIC_TAKEOVER_URL" ] || [ -z "$PUBLIC_TAKEOVER_MISSING_URL" ]; then
                echo 'PUBLIC_TAKEOVER_URL and PUBLIC_TAKEOVER_MISSING_URL are required when takeover is expected.' >&2
                exit 1
              fi
              npm --prefix scripts/qa ci
              (
                cd scripts/qa
                npx playwright install --with-deps chromium firefox
              )
              npm --prefix scripts/qa run qa:public-takeover
              ;;
            false|0|no|off)
              ;;
            *)
              echo 'EXPECT_PUBLIC_FLUTTER_TAKEOVER must be a boolean.' >&2
              exit 1
              ;;
          esac

          # Full public SEO transport contract. Runs inside this step on purpose:
          # a failure here must reach the rollback guard below, which keys on
          # steps.smoke.outcome. The eligible artwork id comes from protected
          # deployment configuration - PUBLIC_CONTRACT_ARTWORK_ID when set,
          # otherwise the id already configured for the takeover smoke.
          contract_id="${PUBLIC_CONTRACT_ARTWORK_ID:-}"
          if [ -z "$contract_id" ] && [ -n "${PUBLIC_TAKEOVER_URL:-}" ]; then
            contract_id="$(printf '%s' "$PUBLIC_TAKEOVER_URL" | sed -E 's#.*/##')"
          fi
          if [ -z "$contract_id" ]; then
            echo 'No eligible artwork id available; set PUBLIC_CONTRACT_ARTWORK_ID or PUBLIC_TAKEOVER_URL.' >&2
            exit 1
          fi
          KUBUS_ORIGIN="$origin" KUBUS_ARTWORK_ID="$contract_id" \
            node scripts/qa/production_seo_contract.mjs

      - name: Roll back failed web smoke
        if: ${{ failure() && steps.promote.outcome == 'success' && steps.smoke.outcome == 'failure' }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          LIVE_DIR: ${{ steps.target.outputs.live_dir }}
          RELEASE_ROOT: ${{ steps.target.outputs.release_root }}
          INCOMING_DIR: ${{ steps.target.outputs.incoming_dir }}
          RELEASE_DIR: ${{ steps.target.outputs.release_dir }}
        with:
          host: ${{ steps.target.outputs.host }}
          username: ${{ steps.target.outputs.username }}
          port: ${{ steps.target.outputs.port }}
          key: ${{ secrets.SFTP_PRIVATE_KEY }}
          passphrase: ${{ secrets.SFTP_PRIVATE_KEY_PASSPHRASE }}
          fingerprint: ${{ secrets.SFTP_HOST_FINGERPRINT }}
          envs: SOURCE_SHA,LIVE_DIR,RELEASE_ROOT,INCOMING_DIR,RELEASE_DIR
          script_stop: true
          script: |
            set -eu
            sh "$INCOMING_DIR/atomic_web_release.sh" rollback

      - name: Finalize successful promotion
        if: ${{ success() }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          LIVE_DIR: ${{ steps.target.outputs.live_dir }}
          RELEASE_ROOT: ${{ steps.target.outputs.release_root }}
          INCOMING_DIR: ${{ steps.target.outputs.incoming_dir }}
          RELEASE_DIR: ${{ steps.target.outputs.release_dir }}
        with:
          host: ${{ steps.target.outputs.host }}
          username: ${{ steps.target.outputs.username }}
          port: ${{ steps.target.outputs.port }}
          key: ${{ secrets.SFTP_PRIVATE_KEY }}
          passphrase: ${{ secrets.SFTP_PRIVATE_KEY_PASSPHRASE }}
          fingerprint: ${{ secrets.SFTP_HOST_FINGERPRINT }}
          envs: SOURCE_SHA,LIVE_DIR,RELEASE_ROOT,INCOMING_DIR,RELEASE_DIR
          script_stop: true
          script: |
            set -eu
            sh "$INCOMING_DIR/atomic_web_release.sh" finalize
            rm -rf "$INCOMING_DIR"

  signed_apk:
    name: Sign tested Android artifact + publish alpha release
    if: >-
      ${{
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'workflow_dispatch' && inputs.build_apk)
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: android-release
    permissions:
      actions: read
      contents: write
    outputs:
      should_build: ${{ steps.release.outputs.should_build }}
      publish: ${{ steps.release.outputs.publish }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      version: ${{ steps.release.outputs.version }}
      source_sha: ${{ steps.source.outputs.sha }}
      source_run_id: ${{ steps.source.outputs.run_id }}
    steps:
      - name: Verify successful CI source
        id: source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_RUN_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          INPUT_CI_RUN_ID: ${{ inputs.ci_run_id }}
          INPUT_ARTIFACT_SHA: ${{ inputs.artifact_sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            run_id="$WORKFLOW_RUN_ID"
            artifact_sha="$WORKFLOW_RUN_SHA"
            workflow_name="$WORKFLOW_RUN_NAME"
            conclusion="$WORKFLOW_RUN_CONCLUSION"
          else
            run_id="$INPUT_CI_RUN_ID"
            artifact_sha="$INPUT_ARTIFACT_SHA"
            workflow_name="CI"
            conclusion="success"
          fi
          if [[ ! "$run_id" =~ ^[0-9]+$ ]] || [[ ! "$artifact_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid CI run ID or artifact SHA." >&2
            exit 1
          fi
          test "$workflow_name" = "CI"
          test "$conclusion" = "success"
          metadata="$RUNNER_TEMP/ci-run.json"
          curl --fail --silent --show-error --location \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/$REPOSITORY/actions/runs/$run_id" \
            > "$metadata"
          test "$(jq -r '.name' "$metadata")" = "CI"
          test "$(jq -r '.conclusion' "$metadata")" = "success"
          test "$(jq -r '.head_sha' "$metadata")" = "$artifact_sha"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "sha=$artifact_sha" >> "$GITHUB_OUTPUT"

      - name: Checkout exact tested source metadata
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.source.outputs.sha }}
          submodules: false

      - name: Resolve immutable alpha release intent
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_PUBLISH: ${{ inputs.publish_github_release }}
          MANUAL_RELEASE_TAG: ${{ inputs.release_tag }}
          MANUAL_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          version="$(awk '/^version:[[:space:]]*/ { print $2; exit }' pubspec.yaml | cut -d+ -f1)"
          if [ -z "$version" ]; then
            echo "Unable to parse application version." >&2
            exit 1
          fi

          if [ "$EVENT_NAME" = "workflow_run" ]; then
            release_tag="v${version}-alpha"
            response="$RUNNER_TEMP/existing-release.json"
            status="$(curl --silent --show-error --location \
              --output "$response" \
              --write-out '%{http_code}' \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/$REPOSITORY/releases/tags/$release_tag")"
            case "$status" in
              200)
                echo "Immutable release $release_tag already exists; skipping signing and publication."
                echo "should_build=false" >> "$GITHUB_OUTPUT"
                echo "publish=false" >> "$GITHUB_OUTPUT"
                ;;
              404)
                ref_response="$RUNNER_TEMP/existing-tag.json"
                ref_status="$(curl --silent --show-error --location \
                  --output "$ref_response" \
                  --write-out '%{http_code}' \
                  --header "Authorization: Bearer $GH_TOKEN" \
                  --header 'X-GitHub-Api-Version: 2022-11-28' \
                  "https://api.github.com/repos/$REPOSITORY/git/ref/tags/$release_tag")"
                if [ "$ref_status" = "200" ]; then
                  echo "Tag $release_tag exists without a GitHub Release; refusing to mutate it." >&2
                  exit 1
                fi
                if [ "$ref_status" != "404" ]; then
                  echo "GitHub tag lookup failed with HTTP $ref_status." >&2
                  cat "$ref_response" >&2
                  exit 1
                fi
                echo "should_build=true" >> "$GITHUB_OUTPUT"
                echo "publish=true" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "GitHub release lookup failed with HTTP $status." >&2
                cat "$response" >&2
                exit 1
                ;;
            esac
            prerelease=true
          else
            release_tag="$MANUAL_RELEASE_TAG"
            prerelease="$MANUAL_PRERELEASE"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "publish=$MANUAL_PUBLISH" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Download exact unsigned Android artifact from CI
        if: ${{ steps.release.outputs.should_build == 'true' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: android-verification-${{ steps.source.outputs.sha }}
          path: unsigned-apk
          run-id: ${{ steps.source.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Set up Java 21
        if: ${{ steps.release.outputs.should_build == 'true' }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        if: ${{ steps.release.outputs.should_build == 'true' }}
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install Android signing tools
        if: ${{ steps.release.outputs.should_build == 'true' }}
        run: sdkmanager --install "build-tools;36.0.0" "platform-tools"

      - name: Configure protected release signing
        if: ${{ steps.release.outputs.should_build == 'true' }}
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS_SECRET: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD_SECRET: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD_SECRET: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          required=(
            "$ANDROID_KEYSTORE_BASE64"
            "$ANDROID_KEY_ALIAS_SECRET"
            "$ANDROID_KEYSTORE_PASSWORD_SECRET"
            "$ANDROID_KEY_PASSWORD_SECRET"
          )
          for value in "${required[@]}"; do
            if [ -z "$value" ]; then
              echo "All four protected Android signing secrets are required." >&2
              exit 1
            fi
          done
          keystore_path="$RUNNER_TEMP/art-kubus-release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          test -s "$keystore_path"
          chmod 600 "$keystore_path"
          {
            echo "ANDROID_KEYSTORE_PATH=$keystore_path"
            echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS_SECRET"
            echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD_SECRET"
            echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD_SECRET"
          } >> "$GITHUB_ENV"

      - name: Sign the exact tested APK
        id: signed
        if: ${{ steps.release.outputs.should_build == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t candidates < <(find unsigned-apk -type f -iname '*release*.apk' | sort)
          if [ "${#candidates[@]}" -ne 1 ]; then
            echo "Expected exactly one unsigned release APK; found ${#candidates[@]}." >&2
            exit 1
          fi
          unsigned_apk="${candidates[0]}"
          apksigner="$ANDROID_HOME/build-tools/36.0.0/apksigner"
          if "$apksigner" verify "$unsigned_apk" >/dev/null 2>&1; then
            echo "CI release APK was already signed; refusing to re-sign an untrusted artifact." >&2
            exit 1
          fi

          version="${{ steps.release.outputs.version }}"
          apk_name="art.kubus.v${version}-${{ steps.source.outputs.sha }}.apk"
          mkdir -p "$GITHUB_WORKSPACE/release"
          signed_apk="$GITHUB_WORKSPACE/release/$apk_name"
          "$apksigner" sign \
            --ks "$ANDROID_KEYSTORE_PATH" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            --key-pass env:ANDROID_KEY_PASSWORD \
            --out "$signed_apk" \
            "$unsigned_apk"
          "$apksigner" verify --verbose --print-certs "$signed_apk"
          (cd "$GITHUB_WORKSPACE/release" && sha256sum "$apk_name" > "$apk_name.sha256")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "apk_name=$apk_name" >> "$GITHUB_OUTPUT"
          echo "apk_path=$signed_apk" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$signed_apk.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload signed APK workflow artifact
        if: ${{ steps.release.outputs.should_build == 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.signed.outputs.apk_name }}
          path: |
            ${{ steps.signed.outputs.apk_path }}
            ${{ steps.signed.outputs.checksum_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Require a new release tag
        if: ${{ steps.release.outputs.publish == 'true' }}
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "release_tag is required when publishing a GitHub Release." >&2
            exit 1
          fi
          if [[ ! "$RELEASE_TAG" =~ ^[A-Za-z0-9._/-]+$ ]] || [[ "$RELEASE_TAG" == *'..'* ]]; then
            echo "release_tag contains unsupported characters." >&2
            exit 1
          fi

      - name: Create immutable GitHub Release
        if: ${{ steps.release.outputs.publish == 'true' }}
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          tag: ${{ steps.release.outputs.release_tag }}
          commit: ${{ steps.source.outputs.sha }}
          name: art.kubus v${{ steps.signed.outputs.version }} alpha
          prerelease: ${{ steps.release.outputs.prerelease }}
          generateReleaseNotes: true
          allowUpdates: false
          replacesArtifacts: false
          artifacts: ${{ steps.signed.outputs.apk_path }},${{ steps.signed.outputs.checksum_path }}

  signed_ipa:
    name: Sign iOS IPA + attach to alpha release
    needs: signed_apk
    if: >-
      ${{
        vars.IOS_RELEASE_ENABLED == 'true' &&
        needs.signed_apk.outputs.should_build == 'true' &&
        needs.signed_apk.outputs.publish == 'true' &&
        (github.event_name == 'workflow_run' || inputs.build_ipa)
      }}
    runs-on: macos-15
    timeout-minutes: 45
    environment: ios-release
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout exact tested source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.signed_apk.outputs.source_sha }}
          submodules: false

      - name: Checkout private backend gitlinks
        shell: bash
        env:
          BACKEND_SUBMODULE_SSH_KEY: ${{ secrets.BACKEND_SUBMODULE_SSH_KEY }}
        run: bash scripts/ci/checkout_backend_submodules.sh

      - name: Set up pinned Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.15.0'

      - name: Set up pinned npm
        run: npm install --global npm@11.7.0

      - name: Set up pinned Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Download exact iOS release build inputs from CI
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ios-release-inputs-${{ needs.signed_apk.outputs.source_sha }}
          path: .dart_tool
          run-id: ${{ needs.signed_apk.outputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Verify exact iOS release build inputs
        id: build_inputs
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.signed_apk.outputs.version }}
        run: |
          set -euo pipefail
          input_file=.dart_tool/public-build-defines.json
          test -s "$input_file"
          version="$(node -e "const values=require('./' + process.argv[1]); process.stdout.write(String(values.KUBUS_APP_VERSION || ''))" "$input_file")"
          build_number="$(node -e "const values=require('./' + process.argv[1]); process.stdout.write(String(values.KUBUS_BUILD_NUMBER || ''))" "$input_file")"
          build_date="$(node -e "const values=require('./' + process.argv[1]); process.stdout.write(String(values.KUBUS_BUILD_DATE || ''))" "$input_file")"
          test "$version" = "$EXPECTED_VERSION"
          [[ "$build_number" =~ ^[0-9]+$ ]]
          [[ "$build_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"

      - name: Resolve locked Flutter dependencies
        run: |
          flutter pub get
          git diff --exit-code -- pubspec.lock

      - name: Configure protected iOS distribution signing
        shell: bash
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_TEAM_ID: ${{ vars.IOS_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID }}
          IOS_EXPORT_METHOD: ${{ vars.IOS_EXPORT_METHOD }}
        run: |
          set -euo pipefail
          required=(
            "$IOS_DISTRIBUTION_CERTIFICATE_BASE64"
            "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD"
            "$IOS_PROVISIONING_PROFILE_BASE64"
            "$IOS_TEAM_ID"
            "$IOS_BUNDLE_ID"
          )
          for value in "${required[@]}"; do
            if [ -z "$value" ]; then
              echo "iOS distribution certificate, provisioning profile, team ID, and bundle ID are required." >&2
              exit 1
            fi
          done
          [[ "$IOS_TEAM_ID" =~ ^[A-Z0-9]{10}$ ]]
          [[ "$IOS_BUNDLE_ID" =~ ^[A-Za-z0-9-]+(\.[A-Za-z0-9-]+)+$ ]]
          test "$IOS_BUNDLE_ID" != 'com.example.artKubus'
          export_method="${IOS_EXPORT_METHOD:-ad-hoc}"
          case "$export_method" in ad-hoc|app-store|development|enterprise) ;; *)
            echo "IOS_EXPORT_METHOD must be ad-hoc, app-store, development, or enterprise." >&2
            exit 1
          esac

          keychain_path="$RUNNER_TEMP/art-kubus-ios-signing.keychain-db"
          keychain_password="$(openssl rand -hex 32)"
          certificate_path="$RUNNER_TEMP/art-kubus-distribution.p12"
          profile_path="$RUNNER_TEMP/art-kubus.mobileprovision"
          profile_plist="$RUNNER_TEMP/art-kubus-profile.plist"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security list-keychain -d user -s "$keychain_path"
          printf '%s' "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$profile_path"
          test -s "$certificate_path"
          test -s "$profile_path"
          security import "$certificate_path" -k "$keychain_path" -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path" | grep -Eq '[1-9][0-9]* valid identities'
          security cms -D -i "$profile_path" > "$profile_plist"
          profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$profile_plist")"
          profile_team="$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$profile_plist")"
          profile_app_id="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$profile_plist")"
          test "$profile_team" = "$IOS_TEAM_ID"
          test "$profile_app_id" = "$IOS_TEAM_ID.$IOS_BUNDLE_ID"
          profile_dir="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$profile_dir"
          cp "$profile_path" "$profile_dir/$profile_uuid.mobileprovision"
          cat > ios/Flutter/Release-CI.xcconfig <<EOF
          KUBUS_IOS_BUNDLE_ID = $IOS_BUNDLE_ID
          DEVELOPMENT_TEAM = $IOS_TEAM_ID
          CODE_SIGN_STYLE = Manual
          PROVISIONING_PROFILE_SPECIFIER = $profile_uuid
          CODE_SIGN_IDENTITY[sdk=iphoneos*] = Apple Distribution
          EOF
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>$export_method</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>$IOS_TEAM_ID</string>
            <key>provisioningProfiles</key><dict><key>$IOS_BUNDLE_ID</key><string>$profile_uuid</string></dict>
          </dict></plist>
          EOF
          {
            echo "IOS_SIGNING_KEYCHAIN=$keychain_path"
            echo "IOS_EXPORT_OPTIONS=$RUNNER_TEMP/ExportOptions.plist"
          } >> "$GITHUB_ENV"

      - name: Build the signed iOS IPA
        shell: bash
        run: |
          set -euo pipefail
          flutter build ipa --release \
            --build-name="${{ steps.build_inputs.outputs.version }}" \
            --build-number="${{ steps.build_inputs.outputs.build_number }}" \
            --export-options-plist="$IOS_EXPORT_OPTIONS" \
            --dart-define-from-file=.dart_tool/public-build-defines.json

      - name: Verify signed IPA and create checksum
        id: signed
        shell: bash
        env:
          EXPECTED_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID }}
        run: |
          set -euo pipefail
          mapfile -t candidates < <(find build/ios/ipa -type f -name '*.ipa' | sort)
          if [ "${#candidates[@]}" -ne 1 ]; then
            echo "Expected exactly one signed IPA; found ${#candidates[@]}." >&2
            exit 1
          fi
          ipa="${candidates[0]}"
          extraction_dir="$RUNNER_TEMP/ipa"
          unzip -q "$ipa" -d "$extraction_dir"
          app_path="$extraction_dir/Payload/Runner.app"
          test -d "$app_path"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app_path/Info.plist" | grep -Fx "$EXPECTED_BUNDLE_ID"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          version="${{ needs.signed_apk.outputs.version }}"
          ipa_name="art.kubus.v${version}-${{ needs.signed_apk.outputs.source_sha }}.ipa"
          mkdir -p "$GITHUB_WORKSPACE/release"
          ipa_path="$GITHUB_WORKSPACE/release/$ipa_name"
          cp "$ipa" "$ipa_path"
          (cd "$GITHUB_WORKSPACE/release" && shasum -a 256 "$ipa_name" > "$ipa_name.sha256")
          echo "ipa_name=$ipa_name" >> "$GITHUB_OUTPUT"
          echo "ipa_path=$ipa_path" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$ipa_path.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload signed IPA workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.signed.outputs.ipa_name }}
          path: |
            ${{ steps.signed.outputs.ipa_path }}
            ${{ steps.signed.outputs.checksum_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach signed IPA to immutable GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.signed_apk.outputs.release_tag }}
          EXPECTED_SHA: ${{ needs.signed_apk.outputs.source_sha }}
          IPA_PATH: ${{ steps.signed.outputs.ipa_path }}
          CHECKSUM_PATH: ${{ steps.signed.outputs.checksum_path }}
        run: |
          set -euo pipefail
          release_json="$RUNNER_TEMP/release.json"
          curl --fail --silent --show-error --location \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$RELEASE_TAG" \
            > "$release_json"
          test "$(jq -r '.target_commitish' "$release_json")" = "$EXPECTED_SHA"
          gh release upload "$RELEASE_TAG" "$IPA_PATH" "$CHECKSUM_PATH"

      - name: Remove ephemeral iOS signing material
        if: ${{ always() }}
        shell: bash
        run: |
          set +e
          security delete-keychain "$IOS_SIGNING_KEYCHAIN" 2>/dev/null || true
          rm -f ios/Flutter/Release-CI.xcconfig
