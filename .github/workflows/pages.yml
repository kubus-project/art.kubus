name: Pages (docs)

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Verify docs folder
        shell: bash
        run: |
          if [ ! -d "docs" ]; then
            echo "docs/ folder not found at repo root" >&2
            exit 1
          fi
          if [ ! -f "docs/index.html" ] && [ ! -f "docs/index.md" ]; then
            echo "docs/ is missing an index file." >&2
            echo "Add docs/index.html (recommended for static Pages) or docs/index.md." >&2
            exit 1
          fi
          echo "Publishing production-facing documentation from master only."
          echo "Docs files:"
          find docs -maxdepth 1 -mindepth 1 -print | sort | head -n 50

      # If your docs are already plain markdown/static files, we can publish as-is.
      # GitHub Pages will render Markdown in the repository view, but Pages serves static assets.
      # For now we just publish the docs directory as a static site.
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
